services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: energy_resilience
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - ./seed/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./seed/postgres_dump.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d energy_resilience"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    env_file:
      - ./backend/.env
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-changeme}"
      # Disable authentication prompt on first boot (password set via env above)
      NEO4J_PLUGINS: "[]"
      # Performance tuning for a dev/demo instance
      NEO4J_dbms_memory_heap_initial__size: "256m"
      NEO4J_dbms_memory_heap_max__size: "512m"
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol (used by neo4j Python driver)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
